name: Deploy ZKTeco Cloud Engine to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 1. Safely copy your physical repository files directly over to your VM directory
      - name: Copy Files to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "app/server.js,app/package.json"
          target: "~/zkteco-node"

      # 2. Log in to install production dependencies and tell PM2 to reload smoothly
      - name: Restart Application Process Natively
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd ~/zkteco-node/app
            
            # Install clean production dependencies directly on the host instance
            npm install --production
            
            # Hot-reload the process if it exists, otherwise do an initial startup boot
            pm2 describe zk-adms-server > /dev/null && pm2 reload zk-adms-server || pm2 start server.js --name "zk-adms-server"
            pm2 save