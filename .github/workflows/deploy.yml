name: Deploy ZKTeco Cloud Engine to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 1. Copies server.js and your new package.json flat into ~/zkteco-node
      - name: Copy Files to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "app/server.js,app/package.json"
          target: "~/zkteco-node"
          strip_components: 1

      # 2. Runs the install and reloads PM2 natively
      - name: Restart Application Process Natively
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd ~/zkteco-node
            rm -rf app
            npm install --production
            pm2 describe zk-adms-server > /dev/null && pm2 reload zk-adms-server || pm2 start server.js --name "zk-adms-server"
            pm2 save