name: Deploy ZKTeco Cloud Engine to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 1. Copies app code flat into the designated target directory on your instance
      - name: Copy Files to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "app/server.js,app/package.json"
          target: "~/zkteco-node"
          strip_components: 1

      # 2. Automatically provisions application modules and invokes a background PM2 reload sequence
      - name: Restart Application Process Natively
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          # Fails fast after 30 seconds if a remote command accidentally locks up
          command_timeout: 30s
          script: |
            cd ~/zkteco-node
            npm install --omit=dev
            
            # Read clean JSON from PM2 to see if server.js is already running under any process name
            if pm2 jlist | grep -q "server.js"; then
              echo "Active execution cluster identified. Deploying zero-downtime application reload..."
              pm2 reload all --update-env
            else
              echo "No tracking container discovered. Binding fresh PM2 instance..."
              pm2 start server.js --name "zk-adms-server"
            fi
            
            pm2 save